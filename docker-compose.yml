services:
  postgres:
    image: postgres:16-alpine
    container_name: cf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clientfinder}
      POSTGRES_USER: ${POSTGRES_USER:-clientfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clientfinder} -d ${POSTGRES_DB:-clientfinder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: cf-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    container_name: cf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cf-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clientfinder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clientfinder}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:rw
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/scripts:/app/scripts:ro
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cf-celery-worker
    restart: unless-stopped
    command:
      - celery
      - -A
      - app.core.celery_app
      - worker
      - -l
      - info
      - -Q
      - scraping,analysis,outreach
      - --concurrency=2
    env_file:
      - .env
    environment:
      # Playwright chromium installed in Dockerfile. Cache path is
      # /home/appuser/.cache/ms-playwright (NOT /root/.cache because
      # /root is mode 700 and appuser can't traverse it after USER
      # directive in Dockerfile).
      PLAYWRIGHT_BROWSERS_PATH: /home/appuser/.cache/ms-playwright
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clientfinder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clientfinder}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    # host.docker.internal is NOT auto-resolved on Linux
    # (only on Docker Desktop). Map it to the gateway so the
    # Google SearXNG scraper can reach the host's SearXNG.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend/app:/app/app:ro
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cf-celery-beat
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - celery
      - -A
      - app.core.celery_app
      - beat
      - -l
      - info
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clientfinder}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clientfinder}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    volumes:
      - ./backend/app:/app/app:ro
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cf-flower
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - celery
      - -A
      - app.core.celery_app
      - flower
      - --port=5555
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      - celery-worker
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    volumes:
      - ./backend/app:/app/app:ro
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cf-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    container_name: cf-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cf-net
    security_opt:
      - no-new-privileges:true

  openwa-proxy:
    image: alpine/socat:1.7.4.4-r0
    container_name: cf-openwa-proxy
    restart: unless-stopped
    entrypoint: []
    command:
      - socat
      - -d
      - -d
      - TCP-LISTEN:5785,fork,reuseaddr
      - TCP:openwa-api:2785
    depends_on:
      - backend
    networks:
      cf-net:
        aliases:
          - openwa-proxy
      openwa-network:
        aliases:
          - cf-openwa-proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  cf-net:
    driver: bridge
    name: cf-net
  openwa-network:
    external: true
    name: openwa-network
