name: Lint + typecheck + build

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pip-audit

      - name: Ruff (lint)
        working-directory: backend
        run: ruff check app/

      - name: mypy (typecheck)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: pip-audit (vulnerabilities)
        working-directory: backend
        run: pip-audit -r requirements.txt --strict

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint 2>&1 || true  # don't fail CI on lint warnings

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  a11y:
    name: A11y (axe-core via Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # NOTE: a11y tests require a running app.
      # We assume the backend + frontend are already up
      # (e.g. via docker compose up -d in a prior CI step).
      # For self-contained CI, use `npx serve` to host
      # the production build. Skipping by default — enable
      # once a CI runner has the full stack available.
      - name: A11y tests (skipped — needs full stack)
        working-directory: frontend
        run: echo "Skipped: a11y tests need running backend + frontend. Run locally with: npm run test:a11y"
        continue-on-error: true
