---
# Prometheus scrape config — scrapes the ClientFinder backend every 15s.
# T8.5 Group 2: monitoring stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: cf-monitor
    app: clientfinder-ai

# Load alert rules
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# Alertmanager endpoint
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["cf-alertmanager:9093"]

# Scrape configs
scrape_configs:
  # ClientFinder backend — main app metrics
  - job_name: cf-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["cf-backend:8000"]
        labels:
          service: backend
          tier: api

  # Self-monitoring (Prometheus itself)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor (optional, for container CPU/memory)
  # Uncomment if you add google/cadvisor to this stack.
  # - job_name: cadvisor
  #   static_configs:
  #     - targets: ["cadvisor:8080"]

  # Node exporter (optional, for host CPU/memory/disk)
  # Uncomment if you add prom/node-exporter to this stack.
  # - job_name: node
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
