---
# Grafana dashboard provider — auto-loads dashboards from /var/lib/grafana/dashboards
# T8.5 Group 2.

apiVersion: 1

providers:
  - name: 'ClientFinder'
    orgId: 1
    folder: 'ClientFinder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
