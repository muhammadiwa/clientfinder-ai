# =============================================================
# ClientFinder — Main vhost (HTTP)
# =============================================================
# Untuk local dev pakai HTTP. Production akan di-upgrade ke
# HTTPS dengan Let's Encrypt di phase T8.
# =============================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security headers (per-request, override global where needed)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/clientfinder.access.log main;
    error_log  /var/log/nginx/clientfinder.error.log warn;

    # Connection limit
    limit_conn conn_limit 20;

    # -------------------------------------------------------------
    # Backend API: /api/*
    # -------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://cf_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffers         8 16k;
        proxy_busy_buffers_size 32k;

        # WebSocket support (for /ws endpoints)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -------------------------------------------------------------
    # Backend health/docs/static (no rate limit)
    # -------------------------------------------------------------
    # T8.6+ self-hosted Swagger UI / Redoc: /static/* is served by the
    # backend. Frontend has no /static/ path (Vite uses /assets/), so
    # this is safe — won't shadow any frontend assets.
    location ~ ^/(health|docs|openapi.json|redoc|static) {
        proxy_pass http://cf_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # -------------------------------------------------------------
    # Frontend SPA
    # -------------------------------------------------------------
    location / {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://cf_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # -------------------------------------------------------------
    # Static assets (long cache)
    # -------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://cf_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------
    # Hidden files (deny)
    # -------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
